name: Policy Tests

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run policy hook tests
        run: |
          chmod +x openshift-policy.sh test-openshift-policy.sh
          ./test-openshift-policy.sh
